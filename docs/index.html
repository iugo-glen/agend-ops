<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Agend Ops - Dashboard</title>
  <style>
    /* === Design Tokens === */
    :root {
      color-scheme: light dark;

      /* Light mode (default) */
      --surface: #FFFFFF;
      --surface-secondary: #F7F6F3;
      --text-primary: #37352F;
      --text-secondary: #787774;
      --border: #E3E2DE;
      --accent: #2383E2;
      --destructive: #EB5757;

      /* Spacing scale (multiples of 4) */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;

      /* Typography */
      --text-sm: 13px;
      --text-body: 15px;
      --text-heading: 18px;
      --text-display: 28px;

      /* Semantic: priority badges */
      --priority-urgent: #EB5757;
      --priority-needs-response: #F2994A;
      --priority-informational: #2383E2;
      --priority-low: #9B9A97;

      /* Semantic: task status dots */
      --status-pending: #F2994A;
      --status-completed: #6FCF97;
      --status-in-progress: #2383E2;

      /* Starred */
      --starred: #FFCC00;
    }

    /* === Dark Mode === */
    @media (prefers-color-scheme: dark) {
      :root {
        --surface: #191919;
        --surface-secondary: #252525;
        --text-primary: #FFFFFFCF;
        --text-secondary: #FFFFFF52;
        --border: #FFFFFF14;
        --accent: #529CCA;
        --destructive: #EB5757;

        --priority-informational: #529CCA;
        --status-in-progress: #529CCA;
      }
    }

    /* === Reduced Motion === */
    @media (prefers-reduced-motion: reduce) {
      * {
        transition: none !important;
      }
    }

    /* === Base Reset === */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: var(--text-body);
      line-height: 1.5;
      color: var(--text-primary);
      background: var(--surface);
      -webkit-font-smoothing: antialiased;
    }

    /* === Header === */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      padding: 0 var(--space-md);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-title {
      font-size: var(--text-heading);
      font-weight: 600;
      line-height: 1.3;
      color: var(--text-primary);
    }

    .header-updated {
      font-size: var(--text-sm);
      color: var(--accent);
      line-height: 1.4;
      text-align: right;
      white-space: nowrap;
    }

    /* === Summary Bar === */
    .summary-bar {
      display: flex;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .summary-pill {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: var(--space-xs) 12px;
      background: var(--surface-secondary);
      border-radius: 4px;
      font-size: var(--text-sm);
      color: var(--text-primary);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .summary-pill strong {
      font-weight: 600;
    }

    /* === Briefing Banner === */
    .briefing-banner {
      margin: var(--space-sm) var(--space-md);
      padding: var(--space-md);
      background: var(--surface-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      border-left: 3px solid var(--accent);
    }

    .briefing-banner[hidden] {
      display: none;
    }

    .briefing-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-sm);
    }

    .briefing-title {
      font-size: var(--text-heading);
      font-weight: 600;
      color: var(--text-primary);
    }

    .briefing-date {
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }

    .briefing-stats {
      display: flex;
      gap: var(--space-md);
      flex-wrap: wrap;
    }

    .briefing-stat {
      font-size: var(--text-body);
      color: var(--text-secondary);
    }

    .briefing-stat strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    @media (min-width: 768px) {
      .briefing-banner {
        max-width: 1280px;
        margin: var(--space-sm) auto;
        padding: var(--space-md) var(--space-xl);
      }
    }

    /* === Tab Bar (mobile only) === */
    .tab-bar {
      display: flex;
      position: sticky;
      top: 48px;
      z-index: 9;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .tab-btn {
      flex-shrink: 0;
      padding: var(--space-sm) var(--space-md);
      min-height: 44px;
      min-width: 44px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-family: inherit;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      white-space: nowrap;
    }

    .tab-btn[aria-selected="true"] {
      color: var(--text-primary);
      border-bottom-color: var(--accent);
    }

    /* === Main Content === */
    .main {
      padding: var(--space-md);
    }

    /* === Column === */
    .column {
      margin-bottom: var(--space-lg);
    }

    .column[hidden] {
      display: none;
    }

    .column-header {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-sm);
    }

    .column-title {
      font-size: var(--text-heading);
      font-weight: 600;
      line-height: 1.3;
    }

    .column-count {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--accent);
    }

    .column-cards {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    /* === Email Card === */
    .email-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px var(--space-md);
      transition: background 150ms ease;
    }

    .email-card-line1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-sm);
      margin-bottom: var(--space-xs);
    }

    .email-sender {
      font-size: var(--text-body);
      font-weight: 600;
      line-height: 1.5;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
      flex: 1;
    }

    .star-icon {
      color: var(--starred);
    }

    .email-subject {
      font-size: var(--text-body);
      font-weight: 400;
      line-height: 1.5;
      margin-bottom: var(--space-xs);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .email-snippet {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      line-height: 1.4;
      margin-bottom: var(--space-xs);
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .email-meta {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: var(--text-sm);
      color: var(--text-secondary);
      line-height: 1.4;
    }

    /* === Task Card === */
    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px var(--space-md);
      transition: background 150ms ease;
    }

    .task-line1 {
      display: flex;
      align-items: flex-start;
      gap: var(--space-sm);
      margin-bottom: var(--space-xs);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 6px;
    }

    .task-description {
      font-size: var(--text-body);
      font-weight: 400;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: var(--text-sm);
      color: var(--text-secondary);
      line-height: 1.4;
      margin-bottom: var(--space-xs);
    }

    .task-timestamp {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      line-height: 1.4;
    }

    /* === Activity Card === */
    .activity-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: var(--space-sm) var(--space-md);
      transition: background 150ms ease;
    }

    .activity-line1 {
      display: flex;
      align-items: flex-start;
      gap: var(--space-sm);
      font-size: var(--text-body);
      font-weight: 400;
      line-height: 1.5;
    }

    .activity-icon {
      flex-shrink: 0;
    }

    .activity-summary {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .activity-meta {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      line-height: 1.4;
      margin-top: 2px;
    }

    /* === Badges === */
    .priority-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: var(--text-sm);
      font-weight: 600;
      color: #FFFFFF;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .priority-badge--urgent { background: var(--priority-urgent); }
    .priority-badge--needs-response { background: var(--priority-needs-response); }
    .priority-badge--informational { background: var(--priority-informational); }
    .priority-badge--low-priority { background: var(--priority-low); }

    .action-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: var(--text-sm);
      font-weight: 400;
      background: var(--surface-secondary);
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .type-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: var(--text-sm);
      font-weight: 400;
      background: var(--surface-secondary);
      color: var(--text-secondary);
      white-space: nowrap;
    }

    /* === Empty / Error State === */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      color: var(--text-secondary);
      font-size: var(--text-body);
      text-align: center;
      padding: var(--space-lg);
    }

    .empty-state-icon {
      font-size: 24px;
      margin-bottom: var(--space-sm);
    }

    /* === Todo Card === */
    .todo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px var(--space-md);
      transition: background 150ms ease;
    }

    .todo-line1 {
      display: flex;
      align-items: flex-start;
      gap: var(--space-sm);
      margin-bottom: var(--space-xs);
    }

    .todo-checkbox {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-radius: 3px;
      flex-shrink: 0;
      margin-top: 3px;
    }

    .todo-checkbox--done {
      background: var(--status-completed);
      border-color: var(--status-completed);
    }

    .todo-text {
      font-size: var(--text-body);
      font-weight: 400;
      line-height: 1.5;
    }

    .todo-text--done {
      text-decoration: line-through;
      color: var(--text-secondary);
    }

    .todo-meta {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: var(--text-sm);
      color: var(--text-secondary);
      line-height: 1.4;
      margin-top: 2px;
    }

    .priority-pill {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .priority-pill--high {
      background: var(--priority-urgent);
      color: #FFFFFF;
    }

    .priority-pill--normal {
      background: var(--surface-secondary);
      color: var(--text-secondary);
    }

    .priority-pill--low {
      background: var(--surface-secondary);
      color: var(--text-secondary);
    }

    .due-badge {
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }

    .due-badge--overdue {
      color: var(--destructive);
      font-weight: 600;
    }

    .due-badge--today {
      color: var(--priority-needs-response);
      font-weight: 600;
    }

    .category-tag {
      font-size: 11px;
      color: var(--text-secondary);
      background: var(--surface-secondary);
      padding: 1px 6px;
      border-radius: 3px;
    }

    /* === Invoice Card === */
    .invoice-card {
      padding: var(--space-sm) var(--space-md);
      border-radius: 6px;
      background: var(--surface);
      margin-bottom: var(--space-sm);
      border-left: 3px solid var(--border);
    }

    .invoice-card--overdue {
      border-left-color: var(--destructive);
      background: color-mix(in srgb, var(--destructive) 5%, var(--surface));
    }

    .invoice-card--reminder {
      border-left-color: var(--priority-informational);
      border-left-style: dashed;
    }

    .invoice-card--paid {
      opacity: 0.6;
    }

    .invoice-project {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--accent);
      margin-right: var(--space-xs);
    }

    .invoice-client {
      font-size: var(--text-body);
      color: var(--text-primary);
    }

    .invoice-meta {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-top: var(--space-xs);
      font-size: var(--text-sm);
      color: var(--text-secondary);
      flex-wrap: wrap;
    }

    .invoice-amount {
      font-weight: 600;
      color: var(--text-primary);
    }

    .invoice-amount--overdue {
      color: var(--destructive);
    }

    .invoice-status {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .invoice-status--overdue {
      background: var(--destructive);
      color: white;
    }

    .invoice-status--sent {
      background: var(--priority-needs-response);
      color: white;
    }

    .invoice-status--draft {
      background: var(--text-secondary);
      color: white;
    }

    .invoice-status--reminder {
      background: var(--priority-informational);
      color: white;
    }

    .invoice-status--paid {
      background: var(--status-completed);
      color: white;
    }

    .invoice-overdue-days {
      font-size: var(--text-sm);
      color: var(--destructive);
      font-weight: 600;
    }

    .invoice-group-label {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: var(--space-xs) 0;
      margin-top: var(--space-sm);
    }

    .invoice-group-label:first-child {
      margin-top: 0;
    }

    /* === Section Divider in Today Tab === */
    .section-label {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: var(--space-sm) 0 var(--space-xs) 0;
    }

    .section-label:first-child {
      padding-top: 0;
    }

    /* === Desktop Layout === */
    @media (min-width: 768px) {
      .header {
        position: static;
        padding: 0 var(--space-xl);
      }

      .summary-bar {
        justify-content: center;
        padding: var(--space-sm) var(--space-xl);
      }

      .tab-bar {
        display: none;
      }

      .main {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: var(--space-lg);
        max-width: 1280px;
        margin: 0 auto;
        padding: var(--space-md) var(--space-xl);
      }

      .column {
        display: block !important;
        background: var(--surface-secondary);
        border-radius: 8px;
        padding: var(--space-md);
        min-height: 200px;
        max-height: calc(100vh - 200px);
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        margin-bottom: 0;
      }

      .column[hidden] {
        display: block !important;
      }

      .email-card:hover,
      .task-card:hover,
      .todo-card:hover,
      .activity-card:hover,
      .invoice-card:hover {
        background: color-mix(in srgb, var(--border) 50%, var(--surface));
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <span class="header-title">Agend Ops</span>
    <span class="header-updated" id="last-updated">Last updated: loading...</span>
  </header>

  <div class="summary-bar" role="status" aria-live="polite" id="summary-bar">
    <span class="summary-pill"><strong id="stat-emails">--</strong> emails</span>
    <span class="summary-pill"><strong id="stat-starred">--</strong> starred</span>
    <span class="summary-pill"><strong id="stat-pending">--</strong> pending</span>
    <span class="summary-pill"><strong id="stat-todos">--</strong> to-dos</span>
    <span class="summary-pill"><strong id="stat-drafts">--</strong> drafts</span>
    <span class="summary-pill"><strong id="stat-overdue">--</strong> overdue</span>
  </div>

  <section class="briefing-banner" id="briefing-banner" hidden>
    <div class="briefing-header">
      <span class="briefing-title">Today's Briefing</span>
      <span class="briefing-date" id="briefing-date"></span>
    </div>
    <div class="briefing-stats">
      <span class="briefing-stat"><strong id="brief-emails">--</strong> emails</span>
      <span class="briefing-stat"><strong id="brief-urgent">--</strong> urgent</span>
      <span class="briefing-stat"><strong id="brief-tasks">--</strong> pending</span>
      <span class="briefing-stat"><strong id="brief-deadlines">--</strong> deadlines</span>
    </div>
  </section>

  <nav class="tab-bar" role="tablist" aria-label="Dashboard columns">
    <button class="tab-btn" role="tab" aria-selected="true" aria-controls="col-today" id="tab-today" tabindex="0">Today</button>
    <button class="tab-btn" role="tab" aria-selected="false" aria-controls="col-starred" id="tab-starred" tabindex="-1">Starred</button>
    <button class="tab-btn" role="tab" aria-selected="false" aria-controls="col-urgent" id="tab-urgent" tabindex="-1">Urgent</button>
    <button class="tab-btn" role="tab" aria-selected="false" aria-controls="col-tasks" id="tab-tasks" tabindex="-1">Tasks</button>
    <button class="tab-btn" role="tab" aria-selected="false" aria-controls="col-activity" id="tab-activity" tabindex="-1">Activity</button>
    <button class="tab-btn" role="tab" aria-selected="false" aria-controls="col-invoices" id="tab-invoices" tabindex="-1">Invoices</button>
  </nav>

  <main class="main">
    <section class="column" id="col-today" role="tabpanel" aria-labelledby="tab-today">
      <div class="column-header">
        <span class="column-title">Today</span>
        <span class="column-count" id="count-today"></span>
      </div>
      <div class="column-cards" id="cards-today"></div>
    </section>

    <section class="column" id="col-starred" role="tabpanel" aria-labelledby="tab-starred" hidden>
      <div class="column-header">
        <span class="column-title">Starred</span>
        <span class="column-count" id="count-starred"></span>
      </div>
      <div class="column-cards" id="cards-starred"></div>
    </section>

    <section class="column" id="col-urgent" role="tabpanel" aria-labelledby="tab-urgent" hidden>
      <div class="column-header">
        <span class="column-title">Urgent</span>
        <span class="column-count" id="count-urgent"></span>
      </div>
      <div class="column-cards" id="cards-urgent"></div>
    </section>

    <section class="column" id="col-tasks" role="tabpanel" aria-labelledby="tab-tasks" hidden>
      <div class="column-header">
        <span class="column-title">Pending Tasks</span>
        <span class="column-count" id="count-tasks"></span>
      </div>
      <div class="column-cards" id="cards-tasks"></div>
    </section>

    <section class="column" id="col-activity" role="tabpanel" aria-labelledby="tab-activity" hidden>
      <div class="column-header">
        <span class="column-title">Recent Activity</span>
        <span class="column-count" id="count-activity"></span>
      </div>
      <div class="column-cards" id="cards-activity"></div>
    </section>

    <section class="column" id="col-invoices" role="tabpanel" aria-labelledby="tab-invoices" hidden>
      <div class="column-header">
        <span class="column-title">Invoices</span>
        <span class="column-count" id="count-invoices"></span>
      </div>
      <div class="column-cards" id="cards-invoices"></div>
    </section>
  </main>

  <script>
    /* === Relative Time === */
    function relativeTime(isoString) {
      if (!isoString) return '';
      var then = new Date(isoString);
      var now = new Date();
      var diffMs = now - then;
      var diffSec = Math.floor(diffMs / 1000);
      var diffMin = Math.floor(diffSec / 60);
      var diffHr = Math.floor(diffMin / 60);
      var diffDay = Math.floor(diffHr / 24);

      if (diffMin < 1) return 'just now';
      if (diffMin < 60) return diffMin + 'm ago';
      if (diffHr < 24) return diffHr + 'h ago';
      if (diffDay < 7) return diffDay + 'd ago';

      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return months[then.getMonth()] + ' ' + then.getDate();
    }

    /* === Duration Formatter === */
    function formatDuration(ms) {
      if (!ms && ms !== 0) return '';
      var totalSec = Math.round(ms / 1000);
      if (totalSec < 60) return totalSec + 's';
      var min = Math.floor(totalSec / 60);
      var sec = totalSec % 60;
      return sec > 0 ? min + 'm ' + sec + 's' : min + 'm';
    }

    /* === Label Maps === */
    var priorityLabels = {
      'urgent': 'Urgent',
      'needs-response': 'Needs Response',
      'informational': 'Info',
      'low-priority': 'Low'
    };

    var statusLabels = {
      'pending': 'Pending',
      'in-progress': 'In Progress',
      'completed': 'Done',
      'cancelled': 'Cancelled'
    };

    var taskTypeLabels = {
      'contract-review': 'Contract Review',
      'meeting-prep': 'Meeting Prep',
      'document-summary': 'Doc Summary',
      'draft-comms': 'Draft Comms'
    };

    var activityIcons = {
      'triage': '\uD83D\uDCE5',
      'task': '\u2713',
      'draft': '\u270F',
      'system': '\u2699',
      'command': '\u2699',
      'briefing': '\uD83D\uDCCB'
    };

    var todoPriorityLabels = {
      'high': 'High',
      'normal': 'Normal',
      'low': 'Low'
    };

    /* === Card Builders (textContent only -- no innerHTML) === */

    function createEmailCard(record) {
      var card = document.createElement('article');
      card.className = 'email-card';

      /* Line 1: sender + priority badge */
      var line1 = document.createElement('div');
      line1.className = 'email-card-line1';

      var sender = document.createElement('span');
      sender.className = 'email-sender';
      var senderText = record.from_name || record.from;
      if (record.starred) {
        var star = document.createElement('span');
        star.className = 'star-icon';
        star.textContent = '\u2605 ';
        star.setAttribute('aria-label', 'Starred');
        sender.appendChild(star);
        var nameNode = document.createTextNode(senderText);
        sender.appendChild(nameNode);
      } else {
        sender.textContent = senderText;
      }
      line1.appendChild(sender);

      if (record.priority && priorityLabels[record.priority]) {
        var badge = document.createElement('span');
        badge.className = 'priority-badge priority-badge--' + record.priority;
        badge.textContent = priorityLabels[record.priority];
        line1.appendChild(badge);
      }
      card.appendChild(line1);

      /* Line 2: subject */
      var subject = document.createElement('div');
      subject.className = 'email-subject';
      subject.textContent = record.subject || '';
      card.appendChild(subject);

      /* Line 3: snippet */
      var snippet = document.createElement('div');
      snippet.className = 'email-snippet';
      snippet.textContent = record.snippet || '';
      card.appendChild(snippet);

      /* Line 4: timestamp + action badge */
      var meta = document.createElement('div');
      meta.className = 'email-meta';

      var ts = document.createElement('span');
      ts.textContent = relativeTime(record.received);
      meta.appendChild(ts);

      if (record.action_type && record.action_type !== 'none') {
        var actionBadge = document.createElement('span');
        actionBadge.className = 'action-badge';
        actionBadge.textContent = record.action_type;
        meta.appendChild(actionBadge);
      }
      card.appendChild(meta);

      return card;
    }

    function createTaskCard(record) {
      var card = document.createElement('article');
      card.className = 'task-card';

      /* Line 1: status dot + description */
      var line1 = document.createElement('div');
      line1.className = 'task-line1';

      var dot = document.createElement('span');
      dot.className = 'status-dot';
      var statusColor = 'var(--status-pending)';
      if (record.status === 'completed') statusColor = 'var(--status-completed)';
      else if (record.status === 'in-progress') statusColor = 'var(--status-in-progress)';
      dot.style.backgroundColor = statusColor;
      dot.setAttribute('aria-label', statusLabels[record.status] || record.status);
      line1.appendChild(dot);

      var desc = document.createElement('span');
      desc.className = 'task-description';
      desc.textContent = record.description || '';
      line1.appendChild(desc);
      card.appendChild(line1);

      /* Line 2: task type badge + client name */
      var meta = document.createElement('div');
      meta.className = 'task-meta';

      if (record.task_type && taskTypeLabels[record.task_type]) {
        var typeBadge = document.createElement('span');
        typeBadge.className = 'type-badge';
        typeBadge.textContent = taskTypeLabels[record.task_type];
        meta.appendChild(typeBadge);
      }

      if (record.client_name) {
        var client = document.createElement('span');
        client.textContent = record.client_name;
        meta.appendChild(client);
      }
      card.appendChild(meta);

      /* Line 3: created timestamp */
      var tsEl = document.createElement('div');
      tsEl.className = 'task-timestamp';
      tsEl.textContent = relativeTime(record.ts);
      card.appendChild(tsEl);

      return card;
    }

    function createActivityCard(entry) {
      var card = document.createElement('article');
      card.className = 'activity-card';

      /* Line 1: icon + summary */
      var line1 = document.createElement('div');
      line1.className = 'activity-line1';

      var icon = document.createElement('span');
      icon.className = 'activity-icon';
      icon.textContent = activityIcons[entry.type] || '\u2699';
      icon.setAttribute('aria-hidden', 'true');
      line1.appendChild(icon);

      var summary = document.createElement('span');
      summary.className = 'activity-summary';
      summary.textContent = entry.summary || '';
      line1.appendChild(summary);
      card.appendChild(line1);

      /* Line 2: timestamp + duration */
      var meta = document.createElement('div');
      meta.className = 'activity-meta';
      var parts = [relativeTime(entry.ts)];
      if (entry.duration_ms) {
        parts.push(formatDuration(entry.duration_ms));
      }
      meta.textContent = parts.join(' \u00B7 ');
      card.appendChild(meta);

      return card;
    }

    function createTodoCard(record) {
      var card = document.createElement('article');
      card.className = 'todo-card';

      /* Line 1: checkbox + text with priority pill */
      var line1 = document.createElement('div');
      line1.className = 'todo-line1';

      var checkbox = document.createElement('span');
      checkbox.className = 'todo-checkbox';
      if (record.status === 'completed') {
        checkbox.className += ' todo-checkbox--done';
      }
      checkbox.setAttribute('aria-hidden', 'true');
      line1.appendChild(checkbox);

      var textWrap = document.createElement('span');
      var textEl = document.createElement('span');
      textEl.className = 'todo-text';
      if (record.status === 'completed') {
        textEl.className += ' todo-text--done';
      }
      textEl.textContent = record.text || '';
      textWrap.appendChild(textEl);

      if (record.priority && todoPriorityLabels[record.priority]) {
        var pill = document.createElement('span');
        pill.className = 'priority-pill priority-pill--' + record.priority;
        pill.textContent = todoPriorityLabels[record.priority];
        textWrap.insertBefore(pill, textEl);
        textWrap.insertBefore(document.createTextNode(' '), textEl);
      }
      line1.appendChild(textWrap);
      card.appendChild(line1);

      /* Line 2: due date badge + category tag */
      var meta = document.createElement('div');
      meta.className = 'todo-meta';

      if (record.due_date) {
        var dueBadge = document.createElement('span');
        dueBadge.className = 'due-badge';
        var today = new Date();
        var todayStr = today.getFullYear() + '-' +
          String(today.getMonth() + 1).padStart(2, '0') + '-' +
          String(today.getDate()).padStart(2, '0');
        if (record.status === 'active' && record.due_date < todayStr) {
          dueBadge.className += ' due-badge--overdue';
          dueBadge.textContent = 'Overdue: ' + record.due_date;
        } else if (record.due_date === todayStr) {
          dueBadge.className += ' due-badge--today';
          dueBadge.textContent = 'Due today';
        } else {
          dueBadge.textContent = 'Due ' + record.due_date;
        }
        meta.appendChild(dueBadge);
      }

      if (record.category) {
        var catTag = document.createElement('span');
        catTag.className = 'category-tag';
        catTag.textContent = '#' + record.category;
        meta.appendChild(catTag);
      }

      if (meta.childNodes.length > 0) {
        card.appendChild(meta);
      }

      return card;
    }

    /* === Invoice Helpers === */
    function formatAmount(amount, currency) {
      if (amount === null || amount === undefined) return '';
      return '$' + amount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' ' + (currency || 'AUD');
    }

    function daysOverdue(dueDateStr) {
      var due = new Date(dueDateStr + 'T00:00:00');
      var now = new Date();
      now.setHours(0, 0, 0, 0);
      var diff = Math.floor((now - due) / (1000 * 60 * 60 * 24));
      return diff > 0 ? diff : 0;
    }

    function createInvoiceCard(record) {
      var card = document.createElement('article');
      card.className = 'invoice-card';

      /* Compute overdue: status=="sent" AND due_date < today */
      var today = new Date();
      var todayStr = today.getFullYear() + '-' +
        String(today.getMonth() + 1).padStart(2, '0') + '-' +
        String(today.getDate()).padStart(2, '0');
      var isOverdue = (record.status === 'sent' && record.due_date && record.due_date < todayStr);

      if (isOverdue) {
        card.className += ' invoice-card--overdue';
      } else if (record.status === 'reminder') {
        card.className += ' invoice-card--reminder';
      } else if (record.status === 'paid') {
        card.className += ' invoice-card--paid';
      }

      /* Line 1: project_code (prominent) + client_name */
      var line1 = document.createElement('div');

      if (record.project_code) {
        var projEl = document.createElement('span');
        projEl.className = 'invoice-project';
        projEl.textContent = record.project_code;
        line1.appendChild(projEl);
      }

      var clientEl = document.createElement('span');
      clientEl.className = 'invoice-client';
      clientEl.textContent = record.client_name || '';
      line1.appendChild(clientEl);

      card.appendChild(line1);

      /* Line 2 (meta): amount, status badge, due info, invoice number */
      var meta = document.createElement('div');
      meta.className = 'invoice-meta';

      /* Amount (reminders may not have one) */
      if (record.status === 'reminder' && record.description) {
        var descEl = document.createElement('span');
        descEl.textContent = record.description;
        meta.appendChild(descEl);
      } else {
        var amountStr = formatAmount(record.amount, record.currency);
        if (amountStr) {
          var amountEl = document.createElement('span');
          amountEl.className = 'invoice-amount';
          if (isOverdue) {
            amountEl.className += ' invoice-amount--overdue';
          }
          amountEl.textContent = amountStr;
          meta.appendChild(amountEl);
        }
      }

      /* Status badge */
      var statusBadge = document.createElement('span');
      statusBadge.className = 'invoice-status';
      if (isOverdue) {
        statusBadge.className += ' invoice-status--overdue';
        statusBadge.textContent = 'OVERDUE';
      } else {
        statusBadge.className += ' invoice-status--' + record.status;
        statusBadge.textContent = record.status.toUpperCase();
      }
      meta.appendChild(statusBadge);

      /* Due date or days overdue */
      if (isOverdue) {
        var daysEl = document.createElement('span');
        daysEl.className = 'invoice-overdue-days';
        var days = daysOverdue(record.due_date);
        daysEl.textContent = days + ' day' + (days !== 1 ? 's' : '') + ' overdue';
        meta.appendChild(daysEl);
      } else if (record.due_date) {
        var dueEl = document.createElement('span');
        dueEl.textContent = 'Due ' + record.due_date;
        meta.appendChild(dueEl);
      }

      /* Invoice number */
      if (record.invoice_number) {
        var invNum = document.createElement('span');
        invNum.textContent = record.invoice_number;
        meta.appendChild(invNum);
      }

      card.appendChild(meta);

      return card;
    }

    /* === Empty / Error States === */
    var emptyMessages = {
      'today': 'Nothing on your plate today. Nice!',
      'starred': 'No starred emails. Inbox zero!',
      'urgent': 'No urgent emails right now.',
      'tasks': 'No pending tasks.',
      'activity': 'No activity recorded yet. Run /triage-inbox to get started.',
      'invoices': 'No outstanding invoices. Looking good!'
    };

    var emptyIcons = {
      'today': '\u2600',
      'starred': '\u2605',
      'urgent': '\u26A0',
      'tasks': '\u2713',
      'activity': '\uD83D\uDCE5',
      'invoices': '\uD83D\uDCB0'
    };

    function renderEmptyState(columnKey) {
      var el = document.createElement('div');
      el.className = 'empty-state';
      var iconEl = document.createElement('div');
      iconEl.className = 'empty-state-icon';
      iconEl.textContent = emptyIcons[columnKey] || '';
      el.appendChild(iconEl);
      var txt = document.createElement('div');
      txt.textContent = emptyMessages[columnKey];
      el.appendChild(txt);
      return el;
    }

    function renderErrorState() {
      var el = document.createElement('div');
      el.className = 'empty-state';
      var txt = document.createElement('div');
      txt.textContent = "Couldn't load dashboard data. Try refreshing the page.";
      el.appendChild(txt);
      return el;
    }

    /* === Populate Column === */
    function populateColumn(containerId, countId, items, createCard, columnKey) {
      var container = document.getElementById(containerId);
      var countEl = document.getElementById(countId);
      container.textContent = '';

      if (items === null) {
        container.appendChild(renderErrorState());
        countEl.textContent = '';
        return;
      }

      if (items.length === 0) {
        container.appendChild(renderEmptyState(columnKey));
        countEl.textContent = '(0)';
        return;
      }

      countEl.textContent = '(' + items.length + ')';
      items.forEach(function(item) {
        container.appendChild(createCard(item));
      });
    }

    /* === Tab Navigation (WAI-ARIA Tabs Pattern) === */
    var tabs = document.querySelectorAll('.tab-btn');
    var panels = {
      'tab-today': 'col-today',
      'tab-starred': 'col-starred',
      'tab-urgent': 'col-urgent',
      'tab-tasks': 'col-tasks',
      'tab-activity': 'col-activity',
      'tab-invoices': 'col-invoices'
    };

    function activateTab(tab) {
      /* Deactivate all */
      tabs.forEach(function(t) {
        t.setAttribute('aria-selected', 'false');
        t.setAttribute('tabindex', '-1');
        var panelId = panels[t.id];
        if (panelId) {
          document.getElementById(panelId).hidden = true;
        }
      });

      /* Activate selected */
      tab.setAttribute('aria-selected', 'true');
      tab.setAttribute('tabindex', '0');
      tab.focus();
      var panelId = panels[tab.id];
      if (panelId) {
        document.getElementById(panelId).hidden = false;
      }
    }

    /* Click handler */
    tabs.forEach(function(tab) {
      tab.addEventListener('click', function() {
        activateTab(tab);
      });
    });

    /* Keyboard navigation: Arrow Left/Right */
    document.querySelector('.tab-bar').addEventListener('keydown', function(e) {
      var tabArr = Array.from(tabs);
      var currentIndex = tabArr.indexOf(document.activeElement);
      if (currentIndex === -1) return;

      var newIndex = -1;
      if (e.key === 'ArrowRight' || e.key === 'Right') {
        newIndex = (currentIndex + 1) % tabArr.length;
      } else if (e.key === 'ArrowLeft' || e.key === 'Left') {
        newIndex = (currentIndex - 1 + tabArr.length) % tabArr.length;
      } else if (e.key === 'Home') {
        newIndex = 0;
      } else if (e.key === 'End') {
        newIndex = tabArr.length - 1;
      }

      if (newIndex >= 0) {
        e.preventDefault();
        activateTab(tabArr[newIndex]);
      }
    });

    /* === Data Fetch + Render === */
    (async function() {
      var feedResult, tasksResult, triageResult, briefingResult, todosResult, invoicesResult;

      try {
        var results = await Promise.allSettled([
          fetch('./feed.json').then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); }),
          fetch('./tasks.json').then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); }),
          fetch('./triage.json').then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); }),
          fetch('./briefing.json').then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); }),
          fetch('./todos.json').then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); }),
          fetch('./invoices.json').then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
        ]);

        feedResult = results[0].status === 'fulfilled' ? results[0].value : null;
        tasksResult = results[1].status === 'fulfilled' ? results[1].value : null;
        triageResult = results[2].status === 'fulfilled' ? results[2].value : null;
        briefingResult = results[3].status === 'fulfilled' ? results[3].value : null;
        todosResult = results[4].status === 'fulfilled' ? results[4].value : null;
        invoicesResult = results[5].status === 'fulfilled' ? results[5].value : null;
      } catch (err) {
        feedResult = null;
        tasksResult = null;
        triageResult = null;
        briefingResult = null;
        todosResult = null;
        invoicesResult = null;
      }

      /* --- Summary Bar --- */
      var emailsScanned = 0;
      var draftsCreated = 0;
      if (feedResult) {
        /* Find latest triage-type entry */
        for (var i = 0; i < feedResult.length; i++) {
          if (feedResult[i].type === 'triage' && feedResult[i].details) {
            /* feedResult is sorted by ts descending in feed.json -- but let's find the last one */
            /* Actually we want the latest by ts. The array may not be guaranteed sorted, so find max. */
            break;
          }
        }
        /* Find the latest triage entry by ts */
        var latestTriage = null;
        for (var j = 0; j < feedResult.length; j++) {
          if (feedResult[j].type === 'triage') {
            if (!latestTriage || feedResult[j].ts > latestTriage.ts) {
              latestTriage = feedResult[j];
            }
          }
        }
        if (latestTriage && latestTriage.details) {
          emailsScanned = latestTriage.details.emails_scanned || 0;
          draftsCreated = latestTriage.details.drafts_created || 0;
        }
      }

      var starredCount = 0;
      if (triageResult) {
        starredCount = triageResult.filter(function(r) { return r.starred === true; }).length;
      }

      var pendingCount = 0;
      if (tasksResult) {
        pendingCount = tasksResult.filter(function(r) { return r.status === 'pending'; }).length;
      }

      var activeTodos = 0;
      if (todosResult) {
        activeTodos = todosResult.filter(function(r) { return r.status === 'active'; }).length;
      }

      document.getElementById('stat-emails').textContent = emailsScanned;
      document.getElementById('stat-starred').textContent = starredCount;
      document.getElementById('stat-pending').textContent = pendingCount;
      document.getElementById('stat-todos').textContent = activeTodos;
      document.getElementById('stat-drafts').textContent = draftsCreated;

      /* --- Last Updated --- */
      var lastTs = null;
      if (feedResult && feedResult.length > 0) {
        for (var k = 0; k < feedResult.length; k++) {
          if (!lastTs || feedResult[k].ts > lastTs) {
            lastTs = feedResult[k].ts;
          }
        }
      }
      document.getElementById('last-updated').textContent = lastTs
        ? 'Last updated: ' + relativeTime(lastTs)
        : 'No data yet';

      /* --- Briefing Banner --- */
      var banner = document.getElementById('briefing-banner');
      if (briefingResult && briefingResult !== null && briefingResult.details) {
        var details = briefingResult.details;
        document.getElementById('brief-emails').textContent = details.emails_scanned || 0;
        document.getElementById('brief-urgent').textContent = details.urgent || 0;
        document.getElementById('brief-tasks').textContent = details.pending_tasks || 0;
        document.getElementById('brief-deadlines').textContent = details.deadlines_48h || 0;
        document.getElementById('briefing-date').textContent = briefingResult.details.briefing_file
          ? briefingResult.details.briefing_file.replace('data/briefings/', '').replace('.md', '')
          : '';
        banner.hidden = false;
      } else {
        banner.hidden = true;
      }

      /* --- Today Column --- */
      var todayContainer = document.getElementById('cards-today');
      var todayCount = document.getElementById('count-today');
      todayContainer.textContent = '';

      var activeTodoItems = todosResult
        ? todosResult.filter(function(r) { return r.status === 'active'; })
            .sort(function(a, b) {
              var priOrder = { 'high': 0, 'normal': 1, 'low': 2 };
              var priDiff = (priOrder[a.priority] || 1) - (priOrder[b.priority] || 1);
              if (priDiff !== 0) return priDiff;
              var aDate = a.due_date || '9999-99-99';
              var bDate = b.due_date || '9999-99-99';
              return aDate < bDate ? -1 : aDate > bDate ? 1 : 0;
            })
        : [];

      var pendingTaskItems = tasksResult
        ? tasksResult.filter(function(r) { return r.status === 'pending' || r.status === 'in-progress'; })
        : [];

      var totalToday = activeTodoItems.length + pendingTaskItems.length;

      if (totalToday === 0) {
        todayContainer.appendChild(renderEmptyState('today'));
        todayCount.textContent = '(0)';
      } else {
        todayCount.textContent = '(' + totalToday + ')';

        if (activeTodoItems.length > 0) {
          var todoLabel = document.createElement('div');
          todoLabel.className = 'section-label';
          todoLabel.textContent = 'YOUR TO-DOS (' + activeTodoItems.length + ')';
          todayContainer.appendChild(todoLabel);
          activeTodoItems.forEach(function(item) {
            todayContainer.appendChild(createTodoCard(item));
          });
        }

        if (pendingTaskItems.length > 0) {
          var taskLabel = document.createElement('div');
          taskLabel.className = 'section-label';
          taskLabel.textContent = 'CLAUDE TASKS (' + pendingTaskItems.length + ')';
          todayContainer.appendChild(taskLabel);
          pendingTaskItems.forEach(function(item) {
            todayContainer.appendChild(createTaskCard(item));
          });
        }
      }

      /* --- Starred Column --- */
      var starredItems = triageResult
        ? triageResult.filter(function(r) { return r.starred === true; })
            .sort(function(a, b) { return b.received > a.received ? 1 : b.received < a.received ? -1 : 0; })
        : null;
      populateColumn('cards-starred', 'count-starred', starredItems, createEmailCard, 'starred');

      /* --- Urgent Column --- */
      var urgentItems = triageResult
        ? triageResult.filter(function(r) { return r.priority === 'urgent' && !r.starred; })
            .sort(function(a, b) { return b.received > a.received ? 1 : b.received < a.received ? -1 : 0; })
        : null;
      populateColumn('cards-urgent', 'count-urgent', urgentItems, createEmailCard, 'urgent');

      /* --- Pending Tasks Column --- */
      var pendingTasks = tasksResult
        ? tasksResult.filter(function(r) { return r.status === 'pending' || r.status === 'in-progress'; })
            .sort(function(a, b) { return b.ts > a.ts ? 1 : b.ts < a.ts ? -1 : 0; })
        : null;
      populateColumn('cards-tasks', 'count-tasks', pendingTasks, createTaskCard, 'tasks');

      /* --- Recent Activity Column --- */
      var activityItems = feedResult
        ? feedResult.slice().sort(function(a, b) { return b.ts > a.ts ? 1 : b.ts < a.ts ? -1 : 0; })
        : null;
      populateColumn('cards-activity', 'count-activity', activityItems, createActivityCard, 'activity');

      /* --- Invoices Column --- */
      var invoiceItems = null;
      if (invoicesResult) {
        var todayStr = new Date().getFullYear() + '-' +
          String(new Date().getMonth() + 1).padStart(2, '0') + '-' +
          String(new Date().getDate()).padStart(2, '0');

        invoiceItems = invoicesResult
          .filter(function(r) { return r.status !== 'written-off'; })
          .map(function(r) {
            r._isOverdue = (r.status === 'sent' && r.due_date && r.due_date < todayStr);
            r._daysOverdue = r._isOverdue ? daysOverdue(r.due_date) : 0;
            return r;
          })
          .sort(function(a, b) {
            var statusOrder = {'overdue': 0, 'sent': 1, 'draft': 2, 'reminder': 3, 'paid': 4, 'disputed': 1.5, 'written-off': 5};
            var aOrder = a._isOverdue ? 0 : (statusOrder[a.status] || 5);
            var bOrder = b._isOverdue ? 0 : (statusOrder[b.status] || 5);
            if (aOrder !== bOrder) return aOrder - bOrder;
            if (a._isOverdue && b._isOverdue) return b._daysOverdue - a._daysOverdue;
            var aDue = a.due_date || '9999-99-99';
            var bDue = b.due_date || '9999-99-99';
            return aDue < bDue ? -1 : aDue > bDue ? 1 : 0;
          });
      }

      populateColumn('cards-invoices', 'count-invoices', invoiceItems, createInvoiceCard, 'invoices');

      /* --- Summary Bar: Overdue Invoices --- */
      var overdueCount = 0;
      if (invoicesResult) {
        var todayStr2 = new Date().getFullYear() + '-' +
          String(new Date().getMonth() + 1).padStart(2, '0') + '-' +
          String(new Date().getDate()).padStart(2, '0');
        overdueCount = invoicesResult.filter(function(r) {
          return r.status === 'sent' && r.due_date && r.due_date < todayStr2;
        }).length;
      }
      document.getElementById('stat-overdue').textContent = overdueCount;
    })();
  </script>

</body>
</html>
